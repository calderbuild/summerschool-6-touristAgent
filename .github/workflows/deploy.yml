name: CI & Deploy

# Build + lint gate on every push and PR; deploy the production build to Vercel
# on every push to master. The app lives in mvp-demo/.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvp-demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mvp-demo/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          # Optional; the map now uses keyless MapLibre tiles, so the build does
          # not require this. Pass it through if the project ever needs it again.
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

  deploy:
    name: Deploy to Vercel (production)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mvp-demo
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      # The deploy steps skip cleanly (green, not red) until the three Vercel
      # secrets are added to the repo. Once VERCEL_TOKEN is set they run.
      - uses: actions/checkout@v4
        if: ${{ env.VERCEL_TOKEN != '' }}
      - name: Install Vercel CLI
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npm i -g vercel@latest
      - name: Pull Vercel env
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
      - name: Build
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token=$VERCEL_TOKEN
      - name: Deploy prebuilt
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
